---
- name: Join Linux Clients to Active Directory
  hosts: clients
  become: true
  vars:
    domain_name: "internal.local"
    domain_admin: "Administrator"
    domain_password: "P@ssword123" # In production, use Ansible Vault for this!

  tasks:
    - name: Install AD-related packages
      apt:
        name:
          - realmd
          - sssd
          - sssd-tools
          - adcli
          - krb5-user
          - packagekit
          - libpam-sss
          - libnss-sss
        state: present
        update_cache: yes

    - name: Check if already joined to domain
      shell: "realm list | grep {{ domain_name }}"
      register: realm_check
      failed_when: false
      changed_when: false

    - name: Join the domain
      shell: "echo '{{ domain_password }}' | realm join -U {{ domain_admin }} {{ domain_name }}"
      when: realm_check.rc != 0

    - name: Configure SSSD to use short usernames (student1 instead of student1@internal.local)
      lineinfile:
        path: /etc/sssd/sssd.conf
        regexp: '^use_fully_qualified_names ='
        line: 'use_fully_qualified_names = False'
      notify: Restart SSSD

    - name: Ensure Home Directories are created on login
      lineinfile:
        path: /etc/pam.d/common-session
        line: "session optional pam_mkhomedir.so skel=/etc/skel umask=077"
        state: present

  handlers:
    - name: Restart SSSD
      service:
        name: sssd
        state: restarted
