---
- name: Bulk User Import and Folder Security
  hosts: dc
  become: true
  vars:
    # This reads your text file and turns it into a list
    student_list: "{{ lookup('file', 'students.txt').splitlines() }}"

  tasks:
    - name: Ensure Students OU exists
      shell: "samba-tool ou create 'OU=Students,DC=internal,DC=local'"
      register: ou_result
      failed_when: "'already exists' not in ou_result.stderr and ou_result.rc != 0"

    - name: Create Student Accounts in Bulk
      shell: >
        samba-tool user create {{ item }} 'Student@123' 
        --userou='OU=Students' 
        --job-title='Student'
      loop: "{{ student_list }}"
      register: user_result
      failed_when: "'already exists' not in user_result.stderr and user_result.rc != 0"

    - name: Set Sticky Bit on Assignments Folder
      # The '1' in '1777' is the Sticky Bit. 
      # It allows everyone to write, but only owners can delete their own files.
      file:
        path: /srv/samba/assignments
        state: directory
        mode: '1777'

    - name: Apply Linux ACLs for Domain Users
      # This ensures the 'domain users' group can actually write to the disk
      shell: "setfacl -R -m g:'domain users':rwx /srv/samba/assignments"
